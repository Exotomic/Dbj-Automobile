<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rachat de véhicule - DBJ Automobile</title>

  <style>
    body{
      font-family: Arial, sans-serif;
      margin:0;
      background:#f4f4f4;
      color:#111;
    }

    .site-header{
      background:#111;
      color:white;
      padding:30px 20px;
    }

    .site-header{
      text-align:center;
    }
    
    .top-bar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      max-width:1100px;
      margin:auto;
    }

    .logo-center{
      text-align:center;
      margin-top:12px;
    }

    .logo{
      display:block;
      margin:0 auto;
      height:145px;
      width:auto;
      max-width:100%;
      object-fit:contain;
    }

    .menu a{
      color:white;
      text-decoration:none;
      margin-left:25px;
      font-weight:bold;
    }

    .menu a:hover{
      color:#d4af37;
    }

    .slogan{
      text-align:center;
      margin-top:18px;
      color:#ddd;
      font-size:22px;
    }

    .container{
      max-width:900px;
      margin:40px auto;
      padding:0 20px;
    }

    .form-box{
      background:white;
      border-radius:16px;
      box-shadow:0 8px 20px rgba(0,0,0,0.10);
      padding:30px;
    }

    h1{
      margin-top:0;
      text-align:center;
    }

    .intro{
      text-align:center;
      color:#555;
      margin-bottom:25px;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:15px;
    }

    .full{
      grid-column:1 / -1;
    }

    label{
      display:block;
      font-weight:bold;
      margin-bottom:6px;
    }

    input, select, textarea{
      width:100%;
      padding:12px;
      border:1px solid #ccc;
      border-radius:10px;
      box-sizing:border-box;
      font-size:16px;
    }

    textarea{
      min-height:140px;
      resize:vertical;
    }

    .preview{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-top:15px;
    }

    .preview img{
      width:110px;
      height:110px;
      object-fit:cover;
      border-radius:10px;
      border:1px solid #ddd;
    }

    .submit-btn{
      margin-top:20px;
      width:100%;
      padding:14px;
      border:none;
      border-radius:10px;
      background:#111;
      color:white;
      font-size:17px;
      font-weight:bold;
      cursor:pointer;
    }

    .submit-btn:hover{
      background:#2b2b2b;
    }

    .msg{
      margin-top:15px;
      text-align:center;
      font-weight:bold;
    }

    .success{
      color:green;
    }

    .error{
      color:#c62828;
    }

    @media(max-width:768px){
      .top-bar{
        flex-direction:column;
        gap:15px;
      }

      .grid{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>
<body>

  <header class="site-header">
    <div class="top-bar">
      <div class="logo-center">
  <img src="images/logo1.png" class="logo" alt="DBJ Automobile">
</div>

      <div class="menu">
        <a href="index.html">Accueil</a>
        <a href="rachat.html">Rachat</a>
      </div>
    </div>

    <p class="slogan">Demande de rachat de votre véhicule</p>
  </header>

  <div class="container">
    <div class="form-box">
      <h1>Estimation / Rachat de véhicule</h1>
      <p class="intro">
        Remplissez ce formulaire. Nous étudierons votre véhicule et vous recontacterons rapidement.
      </p>

      <form id="rachat-form">
        <div class="grid">
          <div>
            <label for="nom">Nom complet</label>
            <input type="text" id="nom" required>
          </div>

          <div>
            <label for="telephone">Téléphone</label>
            <input type="text" id="telephone" required>
          </div>

          <div>
            <label for="email">Email</label>
            <input type="email" id="email" required>
          </div>

          <div>
            <label for="ville">Ville</label>
            <input type="text" id="ville">
          </div>

          <div>
            <label for="marque">Marque</label>
            <input type="text" id="marque" required>
          </div>

          <div>
            <label for="modele">Modèle</label>
            <input type="text" id="modele" required>
          </div>

          <div>
            <label for="annee">Année</label>
            <input type="text" id="annee" required>
          </div>

          <div>
            <label for="km">Kilométrage</label>
            <input type="text" id="km" required>
          </div>

          <div>
            <label for="carburant">Carburant</label>
            <select id="carburant">
              <option value="">Choisir</option>
              <option>Essence</option>
              <option>Diesel</option>
              <option>Hybride</option>
              <option>Électrique</option>
              <option>GPL</option>
              <option>Autre</option>
            </select>
          </div>

          <div>
            <label for="boite">Boîte</label>
            <select id="boite">
              <option value="">Choisir</option>
              <option>Manuelle</option>
              <option>Automatique</option>
            </select>
          </div>

          <div>
            <label for="prix_souhaite">Prix souhaité</label>
            <input type="text" id="prix_souhaite">
          </div>

          <div>
            <label for="immat">Immatriculation</label>
            <input type="text" id="immat">
          </div>

          <div class="full">
            <label for="description">Description du véhicule</label>
            <textarea id="description" placeholder="État général, options, défauts éventuels, historique..."></textarea>
          </div>

          <div class="full">
            <label for="photos">Photos du véhicule</label>
            <input type="file" id="photos" multiple accept="image/*">
            <div class="preview" id="preview"></div>
          </div>
        </div>

        <button type="submit" class="submit-btn">Envoyer ma demande</button>
        <div class="msg" id="message"></div>
      </form>
    </div>
  </div>

  <script type="module">
  import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

  const SUPABASE_URL = "https://nkwxuxzgyhwzdqtdazrd.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_aC1fXSWczl7xmYFMrXYI8g_Pr93UB8_";
  const FUNCTION_URL = `${SUPABASE_URL}/functions/v1/send-rachat-email`;

  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const form = document.getElementById("rachat-form");
  const photosInput = document.getElementById("photos");
  const preview = document.getElementById("preview");
  const message = document.getElementById("message");
  const submitBtn = form.querySelector('button[type="submit"]');

  let selectedFiles = [];

  function setMessage(text, type = "") {
    message.textContent = text;
    message.className = "msg";
    if (type) message.classList.add(type);
  }

  function setLoading(isLoading) {
    submitBtn.disabled = isLoading;
    submitBtn.style.opacity = isLoading ? "0.7" : "1";
    submitBtn.style.cursor = isLoading ? "not-allowed" : "pointer";
    submitBtn.textContent = isLoading ? "Envoi en cours..." : "Envoyer ma demande";
  }

  photosInput.addEventListener("change", () => {
    selectedFiles = Array.from(photosInput.files || []);
    preview.innerHTML = "";

    selectedFiles.forEach((file) => {
      const reader = new FileReader();

      reader.onload = (e) => {
        const img = document.createElement("img");
        img.src = e.target.result;
        preview.appendChild(img);
      };

      reader.readAsDataURL(file);
    });
  });

  async function compressImage(file) {
    return new Promise((resolve, reject) => {
      if (!file.type.startsWith("image/")) {
        reject(new Error(`Le fichier "${file.name}" n'est pas une image valide.`));
        return;
      }

      const img = new Image();
      const reader = new FileReader();

      reader.onload = (e) => {
        img.src = e.target.result;
      };

      reader.onerror = () => reject(new Error("Lecture image impossible"));
      img.onerror = () => reject(new Error("Image invalide"));

      img.onload = () => {
        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d");

        const maxWidth = 1600;
        let width = img.width;
        let height = img.height;

        if (width > maxWidth) {
          height = Math.round(height * (maxWidth / width));
          width = maxWidth;
        }

        canvas.width = width;
        canvas.height = height;

        ctx.drawImage(img, 0, 0, width, height);

        canvas.toBlob(
          (blob) => {
            if (!blob) {
              reject(new Error("Compression impossible"));
              return;
            }

            const compressedFile = new File(
              [blob],
              file.name.replace(/\.[^/.]+$/, "") + ".jpg",
              { type: "image/jpeg" }
            );

            resolve(compressedFile);
          },
          "image/jpeg",
          0.78
        );
      };

      reader.readAsDataURL(file);
    });
  }

  async function uploadPhotos(files) {
    const urls = [];

    for (const file of files) {
      const compressed = await compressImage(file);
      const safeName = compressed.name.replace(/\s+/g, "-").toLowerCase();
      const path = `rachat/${Date.now()}-${Math.random().toString(36).slice(2)}-${safeName}`;

      const { error: uploadError } = await supabase
        .storage
        .from("rachat")
        .upload(path, compressed);

      if (uploadError) {
        throw new Error("Erreur upload photo : " + uploadError.message);
      }

      const { data } = supabase
        .storage
        .from("rachat")
        .getPublicUrl(path);

      urls.push(data.publicUrl);
    }

    return urls;
  }

  function getFormData(photoUrls) {
    return {
      nom: document.getElementById("nom").value.trim(),
      telephone: document.getElementById("telephone").value.trim(),
      email: document.getElementById("email").value.trim(),
      ville: document.getElementById("ville").value.trim(),
      marque: document.getElementById("marque").value.trim(),
      modele: document.getElementById("modele").value.trim(),
      annee: document.getElementById("annee").value.trim(),
      km: document.getElementById("km").value.trim(),
      carburant: document.getElementById("carburant").value,
      boite: document.getElementById("boite").value,
      prix_souhaite: document.getElementById("prix_souhaite").value.trim(),
      immat: document.getElementById("immat").value.trim(),
      description: document.getElementById("description").value.trim(),
      photos: photoUrls.join(",")
    };
  }

  form.addEventListener("submit", async (e) => {
    e.preventDefault();

    setMessage("");
    setLoading(true);

    try {
      setMessage("Étape 1 : upload des photos...");
      const photoUrls = await uploadPhotos(selectedFiles);

      setMessage("Étape 2 : enregistrement de la demande...");
      const payload = getFormData(photoUrls);

      const { error: insertError } = await supabase
        .from("rachat_requests")
        .insert([payload]);

      if (insertError) {
        throw new Error("Erreur insertion : " + insertError.message);
      }

      setMessage("Étape 3 : envoi de l'email...");

      const fnRes = await fetch(FUNCTION_URL, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "apikey": SUPABASE_ANON_KEY
        },
        body: JSON.stringify({
          ...payload,
          photo_urls: photoUrls
        })
      });

      const rawText = await fnRes.text();
      console.log("Réponse fonction :", rawText);

      let fnData = null;
      try {
        fnData = rawText ? JSON.parse(rawText) : null;
      } catch (_) {
        fnData = rawText;
      }

      if (!fnRes.ok) {
        const errorMessage =
          typeof fnData === "object" && fnData?.message
            ? fnData.message
            : rawText || "Erreur inconnue côté fonction";
        throw new Error("Erreur fonction : " + errorMessage);
      }

      setMessage("Votre demande a bien été envoyée.", "success");

      form.reset();
      selectedFiles = [];
      preview.innerHTML = "";
    } catch (err) {
      console.error(err);
      setMessage("Erreur : " + err.message, "error");
    } finally {
      setLoading(false);
    }
  });
</script>

</body>
</html>
