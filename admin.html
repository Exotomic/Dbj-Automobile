<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - Ajouter une voiture</title>

  <style>
    body{
      font-family: Arial, sans-serif;
      background:#f4f4f4;
      margin:0;
      padding:30px;
    }

    .box{
      max-width:800px;
      margin:auto;
      background:white;
      padding:25px;
      border-radius:12px;
      box-shadow:0 5px 15px rgba(0,0,0,0.15);
    }

    h1{
      margin-top:0;
      margin-bottom:20px;
    }

    input, textarea, button{
      width:100%;
      padding:12px;
      margin-bottom:15px;
      border:1px solid #ccc;
      border-radius:8px;
      box-sizing:border-box;
      font-size:16px;
    }

    textarea{
      min-height:180px;
      resize:vertical;
    }

    button{
      background:#111;
      color:white;
      border:none;
      cursor:pointer;
      font-weight:bold;
    }

    button:hover{
      background:#333;
    }

    .top-actions{
      display:flex;
      justify-content:space-between;
      gap:10px;
      margin-bottom:20px;
    }

    .top-actions button{
      width:auto;
      padding:12px 18px;
      margin:0;
    }

    .preview{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-bottom:15px;
    }

    .preview img{
      width:100px;
      height:100px;
      object-fit:cover;
      border-radius:8px;
      border:1px solid #ddd;
      display:block;
    }

    .msg{
      margin-top:10px;
      font-weight:bold;
    }

    .success{
      color:green;
    }

    .error{
      color:red;
    }

    .info{
      color:#111;
    }

    @media(max-width:700px){
      body{
        padding:15px;
      }

      .top-actions{
        flex-direction:column;
      }

      .top-actions button{
        width:100%;
      }
    }
  </style>
</head>
<body>

  <div class="box">
    <div class="top-actions">
      <button type="button" onclick="goToSite()">← Retour au site</button>
      <button type="button" onclick="logout()">Se déconnecter</button>
    </div>

    <h1>Ajouter une voiture</h1>

    <input type="text" id="marque" placeholder="Marque / Modèle">
    <input type="text" id="annee" placeholder="Année">
    <input type="text" id="km" placeholder="Kilométrage">
    <input type="text" id="carburant" placeholder="Carburant">
    <input type="text" id="prix" placeholder="Prix">

    <textarea id="description" placeholder="Description"></textarea>

    <input type="file" id="images" multiple accept="image/*">

    <div class="preview" id="preview"></div>

    <button type="button" onclick="addCar()">Ajouter la voiture</button>

    <div class="msg" id="message"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const supabaseUrl = "TON_URL_SUPABASE";
    const supabaseKey = "TA_CLE_ANON";
    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

    const imageInput = document.getElementById("images");
    const preview = document.getElementById("preview");
    const message = document.getElementById("message");

    checkAuth();

    imageInput.addEventListener("change", function(){
      preview.innerHTML = "";
      const files = imageInput.files;

      for(const file of files){
        const reader = new FileReader();

        reader.onload = function(e){
          const img = document.createElement("img");
          img.src = e.target.result;
          preview.appendChild(img);
        };

        reader.readAsDataURL(file);
      }
    });

    async function checkAuth(){
      const { data, error } = await supabase.auth.getSession();

      if(error || !data.session){
        window.location.href = "login.html";
      }
    }

    function setMessage(text, type){
      message.textContent = text;
      message.className = "msg " + (type || "");
    }

    async function uploadImages(files){
      const urls = [];

      for(const file of files){
        const cleanName = file.name.replace(/\s+/g, "-").toLowerCase();
        const fileName = `${Date.now()}-${Math.random().toString(36).slice(2)}-${cleanName}`;

        const { error: uploadError } = await supabase
          .storage
          .from("cars")
          .upload(fileName, file);

        if(uploadError){
          throw uploadError;
        }

        const { data } = supabase
          .storage
          .from("cars")
          .getPublicUrl(fileName);

        urls.push(data.publicUrl);
      }

      return urls;
    }

    async function addCar(){
      const marque = document.getElementById("marque").value.trim();
      const annee = document.getElementById("annee").value.trim();
      const km = document.getElementById("km").value.trim();
      const carburant = document.getElementById("carburant").value.trim();
      const prix = document.getElementById("prix").value.trim();
      const description = document.getElementById("description").value.trim();
      const files = imageInput.files;

      if(!marque || !annee || !km || !carburant || !prix){
        setMessage("Remplis tous les champs obligatoires.", "error");
        return;
      }

      if(files.length === 0){
        setMessage("Ajoute au moins une image.", "error");
        return;
      }

      try{
        setMessage("Upload des images en cours...", "info");

        const imageUrls = await uploadImages(files);

        const { error } = await supabase
          .from("cars")
          .insert([
            {
              marque: marque,
              annee: annee,
              km: km,
              carburant: carburant,
              prix: prix,
              description: description,
              images: imageUrls.join(",")
            }
          ]);

        if(error){
          setMessage("Erreur : " + error.message, "error");
          return;
        }

        setMessage("Voiture ajoutée avec succès.", "success");

        document.getElementById("marque").value = "";
        document.getElementById("annee").value = "";
        document.getElementById("km").value = "";
        document.getElementById("carburant").value = "";
        document.getElementById("prix").value = "";
        document.getElementById("description").value = "";
        imageInput.value = "";
        preview.innerHTML = "";
      }catch(err){
        setMessage("Erreur upload : " + err.message, "error");
      }
    }

    async function logout(){
      await supabase.auth.signOut();
      window.location.href = "login.html";
    }

    function goToSite(){
      window.location.href = "index.html";
    }
  </script>

</body>
</html>
