<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Catalogue - DBJ Automobile</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#f2f2f2;
background-image: radial-gradient(#e0e0e0 1px, transparent 1px);
background-size:20px 20px;
color:#111;
}

/* HEADER */

.site-header{
background:linear-gradient(180deg,#0f0f0f,#1a1a1a);
padding:20px 20px 30px 20px;
text-align:center;
color:white;
box-shadow:0 5px 15px rgba(0,0,0,0.25);
}

.logo{
height:140px;
}

.logo-center{
display:flex;
justify-content:center;
margin-bottom:10px;
}

.menu{
display:flex;
justify-content:center;
gap:30px;
flex-wrap:wrap;
}

.menu a{
color:white;
text-decoration:none;
font-weight:bold;
font-size:18px;
}

.menu a:hover{
color:#d4af37;
}

.slogan{
margin-top:12px;
color:#ddd;
font-size:20px;
}

/* CONTAINER */

.container{
max-width:1100px;
margin:auto;
padding:40px 20px;
}

h1{
text-align:center;
margin-bottom:10px;
}

.subtitle{
text-align:center;
color:#666;
margin-bottom:30px;
}

/* FILTERS */

.filters{
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;
margin-bottom:30px;
}

.filters input,
.filters select{
padding:12px;
border-radius:8px;
border:1px solid #ccc;
font-size:14px;
}

/* CARS */

.cars{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:25px;
}

.car-card{
background:white;
border-radius:14px;
box-shadow:0 6px 16px rgba(0,0,0,0.10);
overflow:hidden;
transition:0.25s;
}

.car-card:hover{
transform:translateY(-5px);
box-shadow:0 12px 28px rgba(0,0,0,0.15);
}

.car-card img{
width:100%;
height:190px;
object-fit:cover;
}

.car-content{
padding:15px;
}

.car-title{
font-weight:bold;
font-size:18px;
margin-bottom:6px;
}

.car-info{
color:#555;
font-size:14px;
margin-bottom:10px;
}

.price{
display:inline-block;
background:#d4af37;
color:black;
padding:6px 12px;
border-radius:6px;
font-weight:bold;
margin-bottom:10px;
}

.btn{
display:inline-block;
background:#111;
color:white;
padding:8px 14px;
border-radius:8px;
text-decoration:none;
font-size:14px;
}

.btn:hover{
background:#333;
}

.empty{
text-align:center;
padding:20px;
grid-column:1 / -1;
color:#666;
}

/* MOBILE */

@media(max-width:768px){

.logo{
height:110px;
}

.menu{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
max-width:380px;
margin:auto;
}

.menu a{
font-size:17px;
}

.filters{
flex-direction:column;
}

.filters input,
.filters select{
width:100%;
}

}

</style>
</head>

<body>

<header class="site-header">

<div class="logo-center">
<img src="images/logo1.png" class="logo">
</div>

<div class="menu">
<a href="index.html">Accueil</a>
<a href="catalogue.html">Catalogue</a>
<a href="rachat.html">Estimer mon véhicule</a>
<a href="#" onclick="openContact()">Contact</a>
</div>

<p class="slogan">
Votre spécialiste auto : achat, vente et réparation
</p>

</header>


<div class="container">

<h1>Notre catalogue</h1>

<p class="subtitle">
Retrouvez ici tous les véhicules actuellement disponibles chez DBJ Automobile.
</p>


<div class="filters">

<input id="search" placeholder="Rechercher une marque ou un modèle">

<select id="fuel">
<option value="">Tous les carburants</option>
<option value="Essence">Essence</option>
<option value="Diesel">Diesel</option>
<option value="Hybride">Hybride</option>
</select>

<select id="sort">
<option value="recent">Plus récents</option>
<option value="priceLow">Prix croissant</option>
<option value="priceHigh">Prix décroissant</option>
</select>

</div>


<div class="cars" id="cars"></div>

</div>


<script type="module">

import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const supabaseUrl = "https://nkwxuxzgyhwzdqtdazrd.supabase.co";
const supabaseKey = "sb_publishable_aC1fXSWczl7xmYFMrXYI8g_Pr93UB8_";

const supabase = createClient(supabaseUrl,supabaseKey);

const carsContainer = document.getElementById("cars");

const searchInput = document.getElementById("search");
const fuelFilter = document.getElementById("fuel");
const sortSelect = document.getElementById("sort");

let carsData = [];


async function loadCars(){

const {data,error} = await supabase
.from("cars")
.select("*")
.order("created_at",{ascending:false});

carsData = data || [];

displayCars();

}

function displayCars(){

let cars = [...carsData];

const search = searchInput.value.toLowerCase();
const fuel = fuelFilter.value;

if(search){

cars = cars.filter(car =>
`${car.marque} ${car.modele}`.toLowerCase().includes(search)
);

}

if(fuel){

cars = cars.filter(car =>
car.carburant === fuel
);

}

if(sortSelect.value === "priceLow"){

cars.sort((a,b)=> parseInt(a.prix) - parseInt(b.prix));

}

if(sortSelect.value === "priceHigh"){

cars.sort((a,b)=> parseInt(b.prix) - parseInt(a.prix));

}

carsContainer.innerHTML = "";

if(cars.length === 0){

carsContainer.innerHTML = `<div class="empty">Aucun véhicule trouvé</div>`;
return;

}

cars.forEach(car => {

const images = car.images ? car.images.split(",") : [];
const image = images[0] || "images/hero.jpg";

carsContainer.innerHTML += `

<div class="car-card">

<img src="${image}">

<div class="car-content">

<div class="car-title">${car.marque} ${car.modele}</div>

<div class="car-info">
${car.annee} • ${car.km} km • ${car.carburant}
</div>

<div class="price">
${car.prix}
</div>

<br>

<a class="btn" href="detail.html?id=${car.id}">
Voir le véhicule
</a>

</div>

</div>

`;

});

}

searchInput.addEventListener("input",displayCars);
fuelFilter.addEventListener("change",displayCars);
sortSelect.addEventListener("change",displayCars);

loadCars();

</script>


<script>

function openContact(){
alert("Contact : 06 66 37 96 85");
}

</script>

</body>
</html>
