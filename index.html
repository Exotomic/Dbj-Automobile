<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dbj Automobile</title>

  <style>
    body{
      font-family: Arial, sans-serif;
      margin:0;
      background:#f4f4f4;
    }

    header{
      background:#111;
      color:white;
      padding:20px;
      text-align:center;
    }

    .container{
      max-width:1100px;
      margin:auto;
      padding:20px;
    }

    .car{
      display:flex;
      align-items:stretch;
      background:white;
      border-radius:12px;
      overflow:hidden;
      box-shadow:0 5px 15px rgba(0,0,0,0.15);
      margin-bottom:20px;
    }

    .car a{
      display:block;
      width:220px;
      height:220px;
      flex-shrink:0;
    }

    .car img{
      width:220px;
      height:220px;
      object-fit:cover;
      display:block;
    }

    .car-info{
      padding:20px;
      flex:1;
      display:flex;
      flex-direction:column;
      justify-content:center;
    }

    .car-info h3{
      margin:0 0 10px 0;
      font-size:24px;
    }

    .car-info p{
      margin:6px 0;
      font-size:17px;
    }

    .price{
      color:#27ae60;
      font-size:24px;
      font-weight:bold;
      margin-top:10px;
    }

    .empty{
      text-align:center;
      color:#666;
      background:white;
      padding:30px;
      border-radius:12px;
      box-shadow:0 5px 15px rgba(0,0,0,0.08);
    }

    @media(max-width:768px){
      .car{
        flex-direction:column;
      }

      .car a,
      .car img{
        width:100%;
        height:250px;
      }
    }
  </style>
</head>
<body>

  <header>
    <h1>Garage Automobile</h1>
    <p>Nos véhicules disponibles</p>
  </header>

  <div class="container" id="cars">
    <div class="empty">Chargement des véhicules...</div>
  </div>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const supabaseUrl = "https://nkwxuxzgyhwzdqtdazrd.supabase.co";
    const supabaseKey = "sb_publishable_aC1fXSWczl7xmYFMrXYI8g_Pr93UB8_";
    const supabase = createClient(supabaseUrl, supabaseKey);

    async function loadCars(){
      const container = document.getElementById("cars");

      const { data, error } = await supabase
        .from("cars")
        .select("*")
        .order("created_at", { ascending: false });

      if(error){
        container.innerHTML = `<div class="empty">Erreur de chargement des véhicules.</div>`;
        return;
      }

      if(!data || data.length === 0){
        container.innerHTML = `<div class="empty">Aucun véhicule disponible pour le moment.</div>`;
        return;
      }

      container.innerHTML = "";

      data.forEach(car => {
        const imagesArray = car.images ? car.images.split(",") : [];
        const firstImage = imagesArray[0] || "";

        container.innerHTML += `
          <div class="car">
            <a href="detail.html?id=${car.id}">
              <img src="${firstImage}" alt="${car.marque}">
            </a>

            <div class="car-info">
              <h3>${car.marque}</h3>
              <p>${car.annee} • ${car.km} km • ${car.carburant}</p>
              <p class="price">${car.prix}</p>
            </div>
          </div>
        `;
      });
    }

    loadCars();
  </script>

</body>
</html>
