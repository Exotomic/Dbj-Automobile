<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Garage Auto</title>
<style>
body{font-family:Arial;margin:0;background:#f4f4f4;}
header{background:#111;color:white;padding:20px;text-align:center;}
.search{padding:20px;text-align:center;}
input{padding:10px;width:250px;border-radius:5px;border:1px solid #ccc;}
.container{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;padding:30px;}
.car{background:white;border-radius:10px;overflow:hidden;box-shadow:0 5px 15px rgba(0,0,0,0.2);}
.car img{width:80%;height:80px;object-fit:cover;}
.car-info{padding:15px;}
.price{color:#27ae60;font-size:22px;font-weight:bold;}
button{background:#007bff;color:white;border:none;padding:10px;width:100%;border-radius:5px;cursor:pointer;}
</style>
</head>
<body>

<header>
<h1>Garage Auto</h1>
<p>Nos véhicules disponibles</p>
</header>

<div class="search">
<input type="text" id="search" placeholder="Rechercher une marque...">
</div>

<div class="container" id="cars"></div>

<script>
fetch("cars.json")
.then(res => res.json())
.then(data => {
  const container = document.getElementById("cars");
  data.forEach(car => {
    container.innerHTML += `
      <div class="car">
        <a href="detail.html?id=${car.id}">
          <img src="${car.images[0]}">
        </a>
        <div class="car-info">
          <h3>${car.marque}</h3>
          <p>${car.annee} • ${car.km} km • ${car.carburant}</p>
          <p class="price">${car.prix} €</p>
        </div>
      </div>
    `;
  });

  const search = document.getElementById("search");
  search.addEventListener("keyup", function() {
    let filter = search.value.toLowerCase();
    document.querySelectorAll(".car").forEach(carDiv => {
      let text = carDiv.innerText.toLowerCase();
      carDiv.style.display = text.includes(filter) ? "block" : "none";
    });
  });
});
</script>

</body>
</html>
