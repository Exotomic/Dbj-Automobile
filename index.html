<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Garage Automobile</title>

  <style>
    body{
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f4f4;
    }

    header{
      background: #111;
      color: white;
      padding: 20px;
      text-align: center;
    }

    .container{
      max-width: 1100px;
      margin: auto;
      padding: 20px;
    }

    .car{
      display: flex;
      align-items: stretch;
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 5px 15px rgba(0,0,0,0.15);
      margin-bottom: 20px;
    }

    .car a{
      display: block;
      width: 220px;
      height: 220px;
      flex-shrink: 0;
    }

    .car img{
      width: 220px;
      height: 220px;
      object-fit: cover;
      display: block;
    }

    .car-info{
      padding: 20px;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .car-info h3{
      margin: 0 0 10px 0;
      font-size: 24px;
    }

    .car-info p{
      margin: 6px 0;
      font-size: 17px;
    }

    .price{
      color: #27ae60;
      font-size: 24px;
      font-weight: bold;
      margin-top: 10px;
    }

    @media(max-width: 768px){
      .car{
        flex-direction: column;
      }

      .car a,
      .car img{
        width: 100%;
        height: 250px;
      }
    }
  </style>
</head>
<body>

  <header>
    <h1>Garage Automobile</h1>
    <p>Nos véhicules disponibles</p>
  </header>

  <div class="container" id="cars"></div>

  <script>
    fetch("cars.json")
      .then(res => res.json())
      .then(data => {
        let container = document.getElementById("cars");

        data.forEach(car => {
          container.innerHTML += `
            <div class="car">
              <a href="detail.html?id=${car.id}">
                <img src="${car.images[0]}" alt="${car.marque}">
              </a>

              <div class="car-info">
                <h3>${car.marque}</h3>
                <p>${car.annee} • ${car.km} km • ${car.carburant}</p>
                <p class="price">${car.prix}</p>
              </div>
            </div>
          `;
        });
      });
  </script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const supabaseUrl = "https://nkwxuxzgyhwzdqtdazrd.supabase.co";
const supabaseKey = "nkwxuxzgyhwzdqtdazrd;
const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
async function loadCars(){
  const { data, error } = await supabase
    .from("cars")
    .select("*")
    .order("id", { ascending: false });

  let container = document.getElementById("cars");
  container.innerHTML = "";

  if(error){
    container.innerHTML = "<p>Erreur de chargement.</p>";
    return;
  }

  data.forEach(car => {
    const imagesArray = car.images ? car.images.split(",") : [];
    const firstImage = imagesArray[0] || "";

    container.innerHTML += `
      <div class="car">
        <a href="detail.html?id=${car.id}">
          <img src="${firstImage}" alt="${car.marque}">
        </a>

        <div class="car-info">
          <h3>${car.marque}</h3>
          <p>${car.annee} • ${car.km} km • ${car.carburant}</p>
          <p class="price">${car.prix}</p>
        </div>
      </div>
    `;
  });
}

loadCars();
</script>
  
</body>
</html>
