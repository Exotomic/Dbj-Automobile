<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Détail voiture</title>

  <style>
    body{
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      margin: 0;
      padding: 30px;
    }

    .container{
      max-width: 1100px;
      margin: auto;
      background: white;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.15);
    }

    .back{
      display: inline-block;
      margin-bottom: 20px;
      text-decoration: none;
      color: #111;
      font-weight: bold;
    }

    .top{
      display: flex;
      gap: 25px;
      align-items: flex-start;
    }

    .left{
      width: 420px;
      flex-shrink: 0;
    }

    .main-image{
      width: 100%;
      height: 420px;
      object-fit: cover;
      border-radius: 10px;
      display: block;
      margin-bottom: 15px;
      cursor: zoom-in;
    }

    .thumbs{
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .thumbs img{
      width: 95px;
      height: 95px;
      object-fit: cover;
      border-radius: 8px;
      cursor: pointer;
      border: 2px solid transparent;
      display: block;
    }

    .thumbs img:hover{
      border-color: #27ae60;
    }

    .right{
      flex: 1;
    }

    h1{
      margin-top: 0;
      margin-bottom: 15px;
    }

    .price{
      font-size: 30px;
      color: #27ae60;
      font-weight: bold;
      margin: 15px 0;
    }

    .infos{
      font-size: 18px;
      margin-bottom: 20px;
    }

    .description{
      white-space: pre-line;
      line-height: 1.6;
      background: #fafafa;
      padding: 15px;
      border-radius: 10px;
    }

   .lightbox{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100vw;
    height:100vh;
    background:rgba(0,0,0,0.95);
    justify-content:center;
    align-items:center;
    z-index:9999;
    }

    .lightbox img{
    max-width:90%;
    max-height:90%;
    border-radius:10px;
    }

    @media(max-width: 900px){
      .top{
        flex-direction: column;
      }

      .left{
        width: 100%;
      }

      .main-image{
        height: 300px;
      }

      .thumbs img{
        width: 80px;
        height: 80px;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <a href="index.html" class="back">← Retour aux véhicules</a>
    <div id="car-detail"></div>
  </div>

  <div class="lightbox" id="zoomBox" onclick="closeZoom()">
    <img id="zoomImage"
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const carId = urlParams.get("id");

    fetch("cars.json?v=2")
      .then(res => res.json())
      .then(data => {
        const car = data.find(c => c.id === carId);

        if(!car){
          document.getElementById("car-detail").innerHTML = "<p>Voiture introuvable</p>";
          return;
        }

        const thumbs = car.images.map(img => `
          <img src="${img}" alt="${car.marque}" onclick="changeImage('${img}')">
        `).join("");

        document.getElementById("car-detail").innerHTML = `
          <div class="top">
            <div class="left">
              <img src="${car.images[0]}" alt="${car.marque}" class="main-image" id="mainImage" onclick="openZoom()">

              <div class="thumbs">
                ${thumbs}
              </div>
            </div>

            <div class="right">
              <h1>${car.marque}</h1>
              <div class="price">${car.prix}</div>
              <div class="infos">${car.annee} • ${car.km} km • ${car.carburant}</div>

              <h3>Description</h3>
              <div class="description">${car.description}</div>
            </div>
          </div>
        `;
      });

    function changeImage(src){
      document.getElementById("mainImage").src = src;
    }

    function openZoom(){
      const img = document.getElementById("mainImage").src;
      document.getElementById("zoomImage").src = img;
      document.getElementById("zoomBox").style.display = "flex";
    }

    function closeZoom(){
      document.getElementById("zoomBox").style.display = "none";
    }
  </script>

</body>
</html>
