<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion admin</title>
  <style>
    body{
      font-family: Arial, sans-serif;
      background:#f4f4f4;
      margin:0;
      padding:30px;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      box-sizing:border-box;
    }
    .box{
      width:100%;
      max-width:450px;
      background:white;
      padding:25px;
      border-radius:12px;
      box-shadow:0 5px 15px rgba(0,0,0,0.15);
    }
    h1{
      margin-top:0;
      margin-bottom:20px;
      text-align:center;
    }
    input, button{
      width:100%;
      padding:12px;
      margin-bottom:15px;
      border:1px solid #ccc;
      border-radius:8px;
      box-sizing:border-box;
      font-size:16px;
    }
    button{
      background:#111;
      color:white;
      border:none;
      cursor:pointer;
      font-weight:bold;
    }
    .msg{
      margin-top:10px;
      font-weight:bold;
      text-align:center;
    }
    .error{ color:red; }
    .success{ color:green; }
  </style>
</head>
<body>
  <div class="box">
    <h1>Connexion admin</h1>
    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Mot de passe">
    <button type="button" id="loginBtn">Se connecter</button>
    <div class="msg" id="message"></div>
  </div>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const supabaseUrl = "https://nkwxuxzgyhwzdqtdazrd.supabase.co";
    const supabaseKey = "sb_publishable_aC1fXSWczl7xmYFMrXYI8g_Pr93UB8_";
    const supabase = createClient(supabaseUrl, supabaseKey);

    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    const message = document.getElementById("message");
    const loginBtn = document.getElementById("loginBtn");

    loginBtn.addEventListener("click", login);

    async function login(){
      const email = emailInput.value.trim();
      const password = passwordInput.value.trim();

      message.textContent = "";
      message.className = "msg";

      if(!email || !password){
        message.textContent = "Remplis l’email et le mot de passe.";
        message.classList.add("error");
        return;
      }

      try{
        const { data, error } = await supabase.auth.signInWithPassword({
          email,
          password
        });

        if(error){
          message.textContent = "Erreur de connexion : " + error.message;
          message.classList.add("error");
          return;
        }

        if(data.session){
          message.textContent = "Connexion réussie...";
          message.classList.add("success");
          setTimeout(() => {
            window.location.href = "admin.html";
          }, 700);
        } else {
          message.textContent = "Connexion impossible.";
          message.classList.add("error");
        }
      } catch(err){
        message.textContent = "Erreur de connexion : " + err.message;
        message.classList.add("error");
      }
    }
  </script>
</body>
</html>
