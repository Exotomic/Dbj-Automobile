<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion admin</title>

  <style>
    body{
      font-family: Arial, sans-serif;
      background:#f4f4f4;
      margin:0;
      padding:30px;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      box-sizing:border-box;
    }

    .box{
      width:100%;
      max-width:450px;
      background:white;
      padding:25px;
      border-radius:12px;
      box-shadow:0 5px 15px rgba(0,0,0,0.15);
    }

    h1{
      margin-top:0;
      margin-bottom:20px;
      text-align:center;
    }

    input, button{
      width:100%;
      padding:12px;
      margin-bottom:15px;
      border:1px solid #ccc;
      border-radius:8px;
      box-sizing:border-box;
      font-size:16px;
    }

    button{
      background:#111;
      color:white;
      border:none;
      cursor:pointer;
      font-weight:bold;
    }

    button:hover{
      background:#333;
    }

    .msg{
      margin-top:10px;
      font-weight:bold;
      text-align:center;
    }

    .error{
      color:red;
    }

    .success{
      color:green;
    }
  </style>
</head>
<body>

  <div class="box">
    <h1>Connexion admin</h1>

    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Mot de passe">

    <button type="button" onclick="login()">Se connecter</button>

    <div class="msg" id="message"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const supabaseUrl = "https://nkuxuxzgyhwzdqtdazrd.supabase.co";
    const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5rd3h1eHpneWh3emRxdGRhenJkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyNjg0MjksImV4cCI6MjA4ODg0NDQyOX0.V74zf5nyrbGI2pKw8ErUdNDWW2XbBHi_NoyxCqDZeWU";
    const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

    checkIfAlreadyLoggedIn();

    async function checkIfAlreadyLoggedIn(){
      const { data, error } = await supabaseClient.auth.getSession();

      if(!error && data.session){
        window.location.href = "admin.html";
      }
    }

    async function login(){
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
      const message = document.getElementById("message");

      message.textContent = "";
      message.className = "msg";

      if(!email || !password){
        message.textContent = "Remplis l’email et le mot de passe.";
        message.classList.add("error");
        return;
      }

      try{
        const { data, error } = await supabaseClient.auth.signInWithPassword({
          email: email,
          password: password
        });

        if(error){
          message.textContent = "Erreur de connexion : " + error.message;
          message.classList.add("error");
          return;
        }

        if(data.session){
          message.textContent = "Connexion réussie...";
          message.classList.add("success");
          window.location.href = "admin.html";
        } else {
          message.textContent = "Connexion impossible.";
          message.classList.add("error");
        }
      } catch(err){
        message.textContent = "Erreur : " + err.message;
        message.classList.add("error");
      }
    }
  </script>

</body>
</html>
