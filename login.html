<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion admin</title>

  <style>
    body{
      font-family: Arial, sans-serif;
      background:#f4f4f4;
      margin:0;
      padding:30px;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      box-sizing:border-box;
    }

    .box{
      width:100%;
      max-width:450px;
      background:white;
      padding:25px;
      border-radius:12px;
      box-shadow:0 5px 15px rgba(0,0,0,0.15);
    }

    h1{
      margin-top:0;
      margin-bottom:20px;
      text-align:center;
    }

    input, button{
      width:100%;
      padding:12px;
      margin-bottom:15px;
      border:1px solid #ccc;
      border-radius:8px;
      box-sizing:border-box;
      font-size:16px;
    }

    button{
      background:#111;
      color:white;
      border:none;
      cursor:pointer;
      font-weight:bold;
    }

    button:hover{
      background:#333;
    }

    .msg{
      margin-top:10px;
      font-weight:bold;
      text-align:center;
    }

    .error{
      color:red;
    }

    .success{
      color:green;
    }
  </style>
</head>
<body>

  <div class="box">
    <h1>Connexion admin</h1>

    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Mot de passe">

    <button type="button" onclick="login()">Se connecter</button>

    <div class="msg" id="message"></div>
  </div>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script>
  const supabaseUrl = "https://nkwxuxzgyhwzdqtdazrd.supabase.co";
  const supabaseKey = "sb_publishable_aC1fXSWczl7xmYFMrXYI8g_Pr93UB8_";
  const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

  async function login(){
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();
    const message = document.getElementById("message");

    message.textContent = "";
    message.className = "msg";

    try {
      const { data, error } = await supabaseClient.auth.signInWithPassword({
        email,
        password
      });

      if (error) {
        message.textContent = "Erreur de connexion : " + error.message;
        message.classList.add("error");
        return;
      }

      if (data.session) {
        message.textContent = "Connexion réussie...";
        message.classList.add("success");
        setTimeout(() => {
          window.location.href = "admin.html";
        }, 800);
      }
    } catch (err) {
      message.textContent = "Erreur de connexion : " + err.message;
      message.classList.add("error");
    }
  }
</script>

</body>
</html>
