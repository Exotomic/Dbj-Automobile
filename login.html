<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;}
    :root{
      --bg:#050505;
      --bg-soft:#101010;
      --panel:rgba(17,17,17,0.82);
      --panel-strong:rgba(12,12,12,0.94);
      --line:rgba(255,255,255,0.08);
      --line-strong:rgba(255,255,255,0.14);
      --text:#f6f3ee;
      --muted:#b9b0a5;
      --accent:#f07a1f;
      --accent-soft:#ff9c52;
      --shadow:0 24px 60px rgba(0,0,0,0.38);
      --radius-xl:30px;
      --radius-lg:22px;
      --radius-md:16px;
    }
    body{
      font-family:"Manrope","Segoe UI",sans-serif;
      margin:0;
      padding:30px 18px;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(240,122,31,0.14), transparent 28%),
        radial-gradient(circle at 85% 10%, rgba(240,122,31,0.12), transparent 22%),
        linear-gradient(180deg,#090909 0%, #050505 42%, #0b0b0b 100%);
      overflow-x:hidden;
      position:relative;
    }
    body::before,
    body::after{
      content:"";
      position:fixed;
      width:34rem;
      height:34rem;
      border-radius:50%;
      filter:blur(110px);
      z-index:-1;
      pointer-events:none;
      opacity:.34;
    }
    body::before{
      top:-10rem;
      left:-8rem;
      background:rgba(240,122,31,0.18);
    }
    body::after{
      right:-12rem;
      bottom:-10rem;
      background:rgba(240,122,31,0.1);
    }
    .box{
      width:100%;
      max-width:470px;
      padding:34px 30px 28px;
      border-radius:var(--radius-xl);
      border:1px solid var(--line);
      background:
        linear-gradient(180deg, rgba(18,18,18,0.94), rgba(10,10,10,0.98)),
        radial-gradient(circle at top right, rgba(240,122,31,0.08), transparent 28%);
      box-shadow:var(--shadow);
      position:relative;
      overflow:hidden;
      backdrop-filter:blur(18px);
    }
    .box::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(180deg, rgba(255,255,255,0.04), transparent 24%);
      pointer-events:none;
    }
    h1{
      margin:0 0 24px;
      text-align:center;
      font-family:"Sora","Segoe UI",sans-serif;
      font-size:34px;
      line-height:1.08;
      letter-spacing:-0.03em;
      color:var(--text);
      position:relative;
      z-index:1;
    }
    input, button{
      width:100%;
      padding:15px 16px;
      margin-bottom:15px;
      border-radius:14px;
      box-sizing:border-box;
      font-size:15px;
      position:relative;
      z-index:1;
    }
    input{
      border:1px solid var(--line);
      background:rgba(255,255,255,0.03);
      color:var(--text);
      outline:none;
      box-shadow:inset 0 1px 0 rgba(255,255,255,0.03);
      transition:border-color .25s ease, box-shadow .25s ease, background .25s ease, transform .25s ease;
    }
    input::placeholder{
      color:#9f9387;
    }
    input:focus{
      border-color:rgba(240,122,31,0.38);
      box-shadow:0 0 0 4px rgba(240,122,31,0.12);
      background:rgba(255,255,255,0.05);
    }
    button{
      margin-top:6px;
      border:none;
      background:linear-gradient(135deg, var(--accent-soft), var(--accent));
      color:#120b06;
      cursor:pointer;
      font-weight:800;
      letter-spacing:.08em;
      text-transform:uppercase;
      box-shadow:0 16px 30px rgba(240,122,31,0.22);
      transition:transform .25s ease, box-shadow .25s ease, filter .25s ease;
    }
    button:hover{
      transform:translateY(-2px);
      box-shadow:0 20px 36px rgba(240,122,31,0.28), 0 0 24px rgba(240,122,31,0.12);
      filter:saturate(1.05);
    }
    .msg{
      margin-top:14px;
      min-height:24px;
      font-weight:700;
      text-align:center;
      color:var(--muted);
      position:relative;
      z-index:1;
    }
    .error{color:#ff8f8f;}
    .success{color:#7fdca0;}
    @media(max-width:640px){
      body{padding:18px 12px;}
      .box{
        padding:28px 20px 22px;
        border-radius:24px;
      }
      h1{
        font-size:28px;
        margin-bottom:20px;
      }
      input,button{
        padding:14px 15px;
      }
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Connexion admin</h1>
    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Mot de passe">
    <button type="button" id="loginBtn">Se connecter</button>
    <div class="msg" id="message"></div>
  </div>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const supabaseUrl = "https://nkwxuxzgyhwzdqtdazrd.supabase.co";
    const supabaseKey = "sb_publishable_aC1fXSWczl7xmYFMrXYI8g_Pr93UB8_";
    const supabase = createClient(supabaseUrl, supabaseKey);

    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    const message = document.getElementById("message");
    const loginBtn = document.getElementById("loginBtn");

    loginBtn.addEventListener("click", login);

    async function login(){
      const email = emailInput.value.trim();
      const password = passwordInput.value.trim();

      message.textContent = "";
      message.className = "msg";

      if(!email || !password){
        message.textContent = "Remplis l’email et le mot de passe.";
        message.classList.add("error");
        return;
      }

      try{
        const { data, error } = await supabase.auth.signInWithPassword({
          email,
          password
        });

        if(error){
          message.textContent = "Erreur de connexion : " + error.message;
          message.classList.add("error");
          return;
        }

        if(data.session){
          message.textContent = "Connexion réussie...";
          message.classList.add("success");
          setTimeout(() => {
            window.location.href = "admin.html";
          }, 700);
        } else {
          message.textContent = "Connexion impossible.";
          message.classList.add("error");
        }
      } catch(err){
        message.textContent = "Erreur de connexion : " + err.message;
        message.classList.add("error");
      }
    }
  </script>
</body>
</html>
